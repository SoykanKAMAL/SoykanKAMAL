<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1026 604" width="1026" height="604" font-family="ConsolasFallback,Consolas,monospace" font-size="14px" text-rendering="geometricPrecision">
  <style>
    @font-face {
      src: local('Consolas'), local('Consolas Bold');
      font-family: 'ConsolasFallback';
      font-display: swap;
      -webkit-size-adjust: 109%;
      size-adjust: 109%;
    }
    .panel    { fill: #161b22; }
    .titlebar { fill: #21262d; }
    .tabtxt   { fill: #8b949e; font-size: 11px; }
    .cmd      { fill: #7ee787; }
    .out      { fill: #a5d6ff; }
    .gold     { fill: #ffa657; }
    .blue     { fill: #a5d6ff; }
    .pink     { fill: #d2a8ff; }
    .dim      { fill: #8b949e; }
    .lnk      { fill: #7ee787; font-weight: bold; }
    .logo     { fill: #7ee787; }
    .err      { fill: #f85149; }
    .skin     { fill: #c9d1d9; }
    text, tspan { white-space: pre; }
  </style>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="vignette" cx="50%" cy="50%" r="68%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.32"/>
    </radialGradient>

    <pattern id="scanlines" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.18"/>
      <rect width="3" height="1" y="1" fill="#003300" opacity="0.04"/>
    </pattern>

    <linearGradient id="rule" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7ee787" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="vsbox" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <linearGradient id="vsep" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7ee787" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Panel + title bar -->
  <rect x="0" y="0" width="1026" height="604" rx="14" class="panel"/>
  <rect x="0" y="0" width="1026" height="34" rx="14" class="titlebar"/>
  <rect x="0" y="20" width="1026" height="14" class="titlebar"/>
  <rect x="0" y="33" width="1026" height="1.5" fill="url(#rule)"/>

  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>

  <text x="513" y="21" class="tabtxt" text-anchor="middle">soykan.kamal@vitaminsizdev: ~/profile</text>

  <circle cx="1006" cy="17" r="4" fill="#7ee787">
    <animate attributeName="opacity" values="1;0.35;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Content shifted +5x -1y so left/right margins are 20px and top/bottom are 10px -->
  <g transform="translate(5, -1)">

  <!-- Vertical separator between left/right columns -->
  <rect x="418" y="48" width="1" height="562" fill="url(#vsep)"/>

