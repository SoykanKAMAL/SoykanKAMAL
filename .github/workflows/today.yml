name: Update uptime counter

on:
  schedule:
    - cron: "13 4 * * *"  # 04:13 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Recompute uptime
        run: python today.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh uptime counter"
            git push
          fi
